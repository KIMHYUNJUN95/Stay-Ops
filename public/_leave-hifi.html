document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

paint(); return; }\n    const view = e.target.closest('[data-view]');\n    if (view) { state.view = view.getAttribute('data-view'); state.sel = null; state.rejecting = false; state.editEmp = false; closePanel(); repaint(); return; }\n    const filter = e.target.closest('[data-filter]');\n    if (filter) { state.filter = filter.getAttribute('data-filter'); repaint(); return; }\n    const ft = e.target.closest('[data-ftype]');\n    if (ft) { state.fType = ft.getAttribute('data-ftype'); repaint(); return; }\n    const fs = e.target.closest('[data-fsite]');\n    if (fs) { state.fSite = fs.getAttribute('data-fsite'); repaint(); return; }\n    const fso = e.target.closest('[data-fsort]');\n    if (fso) { state.sort = fso.getAttribute('data-fsort'); repaint(); return; }\n    const atog = e.target.closest('[data-approver-toggle]');\n    if (atog) { const mm = L.MEMBERS.find((x) => x.id === atog.getAttribute('data-approver-toggle')); if (mm && !mm.locked) { mm.isApprover = !mm.isApprover; toast(`${mm.nm} 승인 권한을 ${mm.isApprover ? '지정' : '해제'}했습니다`); repaint(); } return; }\n    const tab = e.target.closest('[data-tab]');\n    if (tab) { if (tab.getAttribute('data-tab') !== 'leave') toast('이 시안은 연차 화면입니다 · 다른 탭은 기존 근태 콘솔에서 열립니다', true); return; }\n    const cnav = e.target.closest('[data-cnav]');\n    if (cnav) { const p = pend(); state.cidx = Math.max(0, Math.min(p.length - 1, state.cidx + Number(cnav.getAttribute('data-cnav')))); state.rejecting = false; repaint(); return; }\n    const cidx = e.target.closest('[data-cidx]');\n    if (cidx) { state.cidx = Number(cidx.getAttribute('data-cidx')); state.rejecting = false; repaint(); return; }\n    const brow = e.target.closest('[data-brow]');\n    if (brow && !e.target.closest('[data-qapprove]')) { state.sel = brow.getAttribute('data-brow'); state.rejecting = false; repaint(); return; }\n    const qa = e.target.closest('[data-qapprove]');\n    if (qa) { const r = L.REQ.find((x) => x.id === qa.getAttribute('data-qapprove')); if (r) decide(r, 'approved'); toast(`승인 완료 · ${L.EMP[r.who].nm} 연차`); afterDecision(); return; }\n\n    const demp = e.target.closest('[data-docemp]');\n    if (demp) { state.docEmp = demp.getAttribute('data-docemp'); state.docReq = null; repaint(); return; }\n    const dreq = e.target.closest('[data-docreq]');\n    if (dreq) { state.docReq = dreq.getAttribute('data-docreq'); repaint(); return; }\n    const cn = e.target.closest('[data-calnav]');\n    if (cn) {\n      const v = cn.getAttribute('data-calnav');\n      if (v === 'today') { state.calY = 2026; state.calM = 7; }\n      else if (v === 'm-1') { state.calM -= 1; if (state.calM < 1) { state.calM = 12; state.calY -= 1; } }\n      else if (v === 'm+1') { state.calM += 1; if (state.calM > 12) { state.calM = 1; state.calY += 1; } }\n      else if (v === 'y-1') { state.calY -= 1; }\n      else if (v === 'y+1') { state.calY += 1; }\n      repaint(); return;\n    }\n    const fty = e.target.closest('[data-formtype]');\n    if (fty && state.form) { state.form.type = fty.getAttribute('data-formtype'); renderModal(); return; }\n    const fdu = e.target.closest('[data-formdur]');\n    if (fdu && state.form) { state.form.dur = fdu.getAttribute('data-formdur'); renderModal(); return; }\n\n    const act = e.target.closest('[data-act]');\n    if (act) {\n      const a = act.getAttribute('data-act');\n      if (a === 'panel-close') return closePanel();\n      if (a === 'pop-close') return closePop();\n      if (a === 'notif-open') return openPop('notif');\n      if (a === 'org-open') return openPop('org');\n      if (a === 'export') { toast('연차 내역을 Excel로 내보냅니다'); return; }\n      if (a === 'refresh') { state.loading = true; state.error = false; repaint(); setTimeout(() => { state.loading = false; repaint(); }, 750); return; }\n      if (a === 'filters-clear') { state.fType = 'all'; state.fSite = 'all'; state.q = ''; repaint(); return; }\n      if (a === 'q-clear') { state.q = ''; repaint(); return; }\n      if (a === 'new-req') { openForm(); return; }\n      if (a === 'form-close') { closeForm(); return; }\n      if (a === 'submit-req') {\n        const fm = state.form; if (!fm || !fm.who || !fm.type || !fm.start || !fm.end || fm.start > fm.end) { toast('직원 · 유형 · 기간을 확인해 주세요', true); return; }\n        const days = V.calcDays(fm.start, fm.end, fm.dur);\n        const id = L.nextReqId();\n        L.REQ.unshift({ id, who: fm.who, type: fm.type, start: fm.start, end: fm.end, dur: fm.dur, days, reason: fm.reason || '(사유 미기재)', contact: fm.contact || L.EMP[fm.who].nm, imgs: 0, status: 'requested', at: '방금 · 대리 신청', agent: true });\n        closeForm(); state.view = 'approve'; state.variant = 'A'; state.filter = 'requested'; repaint();\n        toast(`대리 신청 완료 · ${L.EMP[fm.who].nm} · ${days}일 · 승인 대기`);\n        return;\n      }\n      if (a === 'emp-edit') { state.editEmp = true; repaintPanel(); setTimeout(() => { const i = document.querySelector('[data-empedit=\"hire\"]'); if (i) i.focus(); }, 60); return; }\n      if (a === 'emp-edit-cancel') { state.editEmp = false; repaintPanel(); return; }\n      if (a === 'emp-edit-save') {\n        const w = act.getAttribute('data-id'); const e2 = L.EMP[w];\n        const hv = document.querySelector('[data-empedit=\"hire\"]'), gv = document.querySelector('[data-empedit=\"grant\"]'), bv = document.querySelector('[data-empedit=\"bonus\"]');\n        if (e2) {\n          if (hv && hv.value) { e2.hire = hv.value; e2.ineligible = false; }\n          if (gv) e2.grant = Math.max(0, Number(gv.value) || 0);\n          if (bv) e2.bonus = Math.max(0, Number(bv.value) || 0);\n          e2.baseRem = e2.grant - e2.usedBase; e2.bonusRem = e2.bonus - e2.usedBonus;\n        }\n        state.editEmp = false; toast(`${e2.nm} 입사일 · 잔여를 저장했습니다`); repaint(); repaintPanel(); return;\n      }\n      if (a === 'mobile') { toast('모바일 연차 화면을 미리보기로 엽니다'); return; }\n      if (a === 'print') { window.print(); return; }\n      if (a === 'approve') {\n        const id = act.getAttribute('data-id'); const r = L.REQ.find((x) => x.id === id); if (r) decide(r, 'approved');\n        toast(`승인 완료 · ${L.EMP[r.who].nm} 연차 · 휴가 문서 생성됨`);\n        afterDecision(); return;\n      }\n      if (a === 'reject') { state.rejecting = true; if (state.variant === 'A') repaintPanel(); else repaint(); setTimeout(() => { const t = document.querySelector('.ltext'); if (t) t.focus(); }, 60); return; }\n      if (a === 'reject-cancel') { state.rejecting = false; if (state.variant === 'A') repaintPanel(); else repaint(); return; }\n      if (a === 'reject-confirm') {\n        const t = document.querySelector('.ltext'); const cur = currentReq(); if (cur) decide(cur, 'rejected', t && t.value.trim());\n        state.rejecting = false; toast('반려 처리되었습니다', true); afterDecision(); return;\n      }\n      if (a === 'open-req') { state.sel = 'req:' + act.getAttribute('data-id'); state.rejecting = false; openPanel(); return; }\n      if (a === 'godoc') { const id = act.getAttribute('data-id'); const rr = L.REQ.find((x) => x.id === id); state.view = 'doc'; state.docReq = id; state.docEmp = rr ? rr.who : null; closePanel(); repaint(); return; }\n      return;\n    }\n    const panel = e.target.closest('[data-panel]');\n    if (panel) { state.sel = panel.getAttribute('data-panel'); state.rejecting = false; openPanel(); return; }\n  });\n\n  function currentReq() {\n    if (state.variant === 'A') return L.REQ.find((x) => 'req:' + x.id === state.sel);\n    if (state.variant === 'B') return L.REQ.find((x) => 'req:' + x.id === state.sel);\n    return pend()[state.cidx];\n  }\n  function afterDecision() {\n    if (state.variant === 'A') { repaint(); repaintPanel(); return; }\n    if (state.variant === 'B') { const p = pend(); state.sel = p.length ? 'req:' + p[0].id : null; repaint(); return; }\n    // C: keep index (array shrank → shows next), clamp\n    const p = pend(); if (state.cidx >= p.length) state.cidx = Math.max(0, p.length - 1); repaint();\n  }\n\n  document.addEventListener('change', (e) => {\n    const ff = e.target.closest('[data-formfield]');\n    if (ff && state.form) {\n      const k = ff.getAttribute('data-formfield'); state.form[k] = ff.value;\n      if (k === 'who' || k === 'start' || k === 'end') renderModal();\n      return;\n    }\n  });\n  document.addEventListener('input', (e) => {\n    const qi = e.target.closest('[data-qinput]');\n    if (qi) { const car = qi.selectionStart; state.q = qi.value; repaint(); const n = document.querySelector('[data-qinput]'); if (n) { n.focus(); try { n.setSelectionRange(car, car); } catch (_) {} } return; }\n    const ff = e.target.closest('[data-formfield]');\n    if (ff && state.form) { const k = ff.getAttribute('data-formfield'); state.form[k] = ff.value; if (k === 'start' || k === 'end') { const d = document.querySelector('.fdays b'); if (d) d.textContent = V.calcDays(state.form.start, state.form.end, state.form.dur) + '일'; } }\n  });\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape') { if (state.form) { closeForm(); } else if (state.rejecting) { state.rejecting = false; state.variant === 'A' ? repaintPanel() : repaint(); } else if (state.editEmp) { state.editEmp = false; repaintPanel(); } else { closePanel(); closePop(); } return; }\n    if (state.view === 'approve' && state.variant === 'C') {\n      if (e.key === 'ArrowRight') { const p = pend(); state.cidx = Math.min(p.length - 1, state.cidx + 1); repaint(); }\n      if (e.key === 'ArrowLeft') { state.cidx = Math.max(0, state.cidx - 1); repaint(); }\n    }\n  });\n\n  document.addEventListener('toggle', (e) => {\n    const d = e.target;\n    if (d && d.classList && d.classList.contains('fdrop') && d.open) {\n      document.querySelectorAll('.fdrop[open]').forEach((o) => { if (o !== d) o.open = false; });\n    }\n  }, true);\n  document.addEventListener('click', (e) => {\n    if (!e.target.closest('.fdrop')) document.querySelectorAll('.fdrop[open]').forEach((o) => { o.open = false; });\n  });\n\n  render();\n
