<svg xmlns="http://www.w3.org/2000/svg" width="794" height="1123" viewBox="0 0 794 1123" role="img" aria-labelledby="title desc">
  <title id="title">Stay Ops attendance QR print preview</title>
  <desc id="desc">Korean and Japanese print design preview for fixed building attendance QR code.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#f1eadc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f2a1f" flood-opacity="0.16"/>
    </filter>
    <pattern id="qrPattern" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#fff"/>
      <rect x="0" y="0" width="16" height="16" fill="#101828"/>
      <rect x="24" y="8" width="8" height="8" fill="#101828"/>
      <rect x="8" y="24" width="8" height="8" fill="#101828"/>
    </pattern>
  </defs>

  <rect width="794" height="1123" fill="#e8e0d2"/>
  <rect x="55" y="48" width="684" height="1027" rx="36" fill="url(#paper)" filter="url(#shadow)"/>

  <text x="397" y="120" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" font-weight="700" fill="#182235">Stay Ops</text>
  <text x="397" y="174" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="36" font-weight="900" fill="#182235">출퇴근 QR</text>
  <text x="397" y="216" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="25" font-weight="800" fill="#344054">勤怠QR</text>

  <rect x="142" y="258" width="510" height="72" rx="24" fill="#fffdfa" stroke="#ded5c6" stroke-width="2"/>
  <text x="180" y="304" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="22" font-weight="800" fill="#667085">건물명 / 建物名</text>
  <text x="615" y="304" text-anchor="end" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="24" font-weight="900" fill="#1f2f5f">아라키초A</text>

  <rect x="197" y="374" width="400" height="400" rx="28" fill="#fff" stroke="#d9d0c0" stroke-width="3"/>
  <rect x="231" y="408" width="332" height="332" fill="url(#qrPattern)"/>
  <rect x="231" y="408" width="86" height="86" fill="#fff"/>
  <rect x="246" y="423" width="56" height="56" fill="#101828"/>
  <rect x="260" y="437" width="28" height="28" fill="#fff"/>
  <rect x="477" y="408" width="86" height="86" fill="#fff"/>
  <rect x="492" y="423" width="56" height="56" fill="#101828"/>
  <rect x="506" y="437" width="28" height="28" fill="#fff"/>
  <rect x="231" y="654" width="86" height="86" fill="#fff"/>
  <rect x="246" y="669" width="56" height="56" fill="#101828"/>
  <rect x="260" y="683" width="28" height="28" fill="#fff"/>
  <rect x="326" y="503" width="142" height="142" rx="22" fill="#fff" opacity="0.94"/>
  <text x="397" y="559" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="19" font-weight="900" fill="#1f2f5f">실제 QR</text>
  <text x="397" y="590" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="15" font-weight="800" fill="#667085">ここに配置</text>

  <text x="397" y="820" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="24" font-weight="900" fill="#182235">직원 근태 기록용입니다</text>
  <text x="397" y="858" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="21" font-weight="800" fill="#344054">スタッフ勤怠記録用です</text>

  <rect x="120" y="894" width="554" height="104" rx="26" fill="#fffdfa" stroke="#ded5c6" stroke-width="2"/>
  <circle cx="158" cy="929" r="11" fill="#1f2f5f"/>
  <text x="183" y="936" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="20" font-weight="800" fill="#182235">앱에서 출근 또는 퇴근을 누른 뒤 스캔하세요.</text>
  <circle cx="158" cy="966" r="11" fill="#1f2f5f"/>
  <text x="183" y="973" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="19" font-weight="800" fill="#182235">アプリで出勤または退勤を押してからスキャンしてください。</text>

  <text x="397" y="1032" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="17" font-weight="900" fill="#b42318">외부 공유 금지 · 外部共有禁止</text>
  <text x="397" y="1060" text-anchor="middle" font-family="'Noto Sans KR', 'Noto Sans JP', Arial, sans-serif" font-size="15" font-weight="700" fill="#667085">훼손 또는 인식 오류 시 관리자에게 연락 · 破損または読取不可の場合は管理者へ連絡</text>
</svg>
