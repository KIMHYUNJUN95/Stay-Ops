<!--
  StayOps 홈 디자인(Haru Ops v2)의 최상단 3D 히어로 이미지(구체/orb).
  현재 홈 화면에서는 사용하지 않음. 향후 3D 히어로를 다시 활성화할 때를 위해 보관.
  원본: Home Screen v2.html 의 inline ORB SVG (회전 타원 26개 + 중심 원, 방사형 보라 그라데이션).
  보관 위치만 옮긴 것이며 삭제 금지.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <radialGradient id="g" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.5" stop-color="#a9b6ff" />
      <stop offset="1" stop-color="#5b6fd6" />
    </radialGradient>
  </defs>
  <g fill="none" stroke="url(#g)" stroke-width="1" opacity="0.7">
    <ellipse cx="120" cy="120" rx="36" ry="84" transform="rotate(0 120 120)" />
    <ellipse cx="120" cy="120" rx="38.6" ry="84" transform="rotate(7 120 120)" />
